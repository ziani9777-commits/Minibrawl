// --- Fonctions Utilitaires ---
const getRank = t => { let r = RANKS[0]; for (const rk of RANKS) if (t >= rk.min) r = rk; return r; };
const loadSave = () => { try { const s = JSON.parse(localStorage.getItem("bsv4") || "{}"); return { t: s.t || 0, ul: s.ul || [0], sel: s.sel || 0 }; } catch { return { t: 0, ul: [0], sel: 0 }; } };
const doSave = d => { try { localStorage.setItem("bsv4", JSON.stringify(d)); } catch { } };
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const norm = v => { const m = Math.hypot(v.x, v.y) || 1; return { x: v.x / m, y: v.y / m }; };
const rnd = (a, b) => a + Math.random() * (b - a);

// --- Dessin (Canvas) ---
function drawChar(ctx, x, y, br, team, facingLeft = false, sc = 1, flashing = false) {
  ctx.save();
  ctx.translate(x, y);
  if (facingLeft) ctx.scale(-sc, sc); else ctx.scale(sc, sc);
  const C = br.color, Dk = br.dark, Sk = br.skin, Hr = br.hair;
  const fl = flashing;

  ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 42, 26, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = team === 0 ? "#00d2ff" : "#ff4444"; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(0, 42, 22, 7, 0, 0, Math.PI * 2); ctx.stroke();

  // Corps & Tête (Simplifié pour le code complet)
  ctx.fillStyle = fl ? "#fff" : C; ctx.beginPath(); ctx.roundRect(-18, -8, 36, 34, 10); ctx.fill();
  ctx.fillStyle = fl ? "#fff" : Sk; ctx.beginPath(); ctx.arc(0, -28, 24, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

const mkUnit = (x, y, br, team, id) => ({
  x, y, hp: br.hp, maxHp: br.hp, spd: br.spd, dmg: br.dmg,
  range: br.range, cd: br.cd, color: br.color, dark: br.dark, name: br.name, id: br.id, uid: id, team, alive: true, atkTimer: 0, flash: 0, facingLeft: team === 1
});

